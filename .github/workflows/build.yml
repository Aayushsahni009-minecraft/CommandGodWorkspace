name: Build Binary
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6 # Updated from v4 to v6
      
      - name: Compile
        run: |
          # Create build folder
          mkdir -p build
          # Run CMake and tell it the source is in the current directory (.)
          # And put the output in the build folder (B build)
          cmake -S . -B build
          # Build the project
          cmake --build build
          
      - name: Save Result
        uses: actions/upload-artifact@v6 # Updated from v4 to v6
        with:
          name: my-binary
          path: build/cg_workspace
