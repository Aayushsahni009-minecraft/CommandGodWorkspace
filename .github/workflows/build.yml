name: Build Graphical Workspace
on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      # Use v6 for Node 24 support in 2026
      - uses: actions/checkout@v6 

      - name: Install System Graphics Libraries
        run: |
          sudo apt-get update
          # libsdl2-dev provides the headers and logic for windows
          sudo apt-get install -y cmake g++ libsdl2-dev 

      - name: Configure and Compile
        run: |
          mkdir -p build
          # -S . looks for CMakeLists.txt in the root
          cmake -S . -B build
          cmake --build build

      - name: Upload Workspace Binary
        uses: actions/upload-artifact@v7
        with:
          name: cg-workspace-windowed
          path: build/cg_workspace
          # In 2026, set archive to false if you want a direct file download
          archive: true