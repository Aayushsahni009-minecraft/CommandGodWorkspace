name: Build Binary
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6 # Updated from v4 to v6
      
      - name: Compile
        run: |
          mkdir build
          cd build
          cmake ..
          make
          
      - name: Save Result
        uses: actions/upload-artifact@v6 # Updated from v4 to v6
        with:
          name: my-binary
          path: build/cg_workspace
